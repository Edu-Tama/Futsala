<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Futsala">
<title>Futsala Villaverde · Cuerpo técnico</title>
<style>
  :root{
    --bg:#0b1220; --surface:#131c2e; --surface-2:#16203a; --line:#26324b;
    --text:#eef2f8; --muted:#9aa6bd; --muted-2:#697490;
    --brand:#0ea5e9; --brand-ink:#04293b;
    --club:#4c8f53; --club-2:#67b070; --club-deep:#0f3d1c;
    --goal:#22c55e; --foul:#f59e0b; --red:#ef4444; --rival:#7c8aa6;
    --radius:14px; --tap:54px;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans);
    font-size:16px; line-height:1.4; padding-bottom:calc(72px + env(safe-area-inset-bottom));
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:560px;margin:0 auto;padding:14px 14px 0}
  h1,h2,h3{margin:0;font-weight:700;letter-spacing:-.01em}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--club-2);font-weight:700}
  button{font-family:inherit;font-size:16px;color:inherit;border:0;background:none;cursor:pointer}
  .hidden{display:none!important}
  .row{display:flex;gap:8px;align-items:center}
  .grow{flex:1}
  .pos{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

  /* Header */
  header{display:flex;align-items:center;gap:11px;justify-content:flex-start;padding:6px 2px 12px;border-bottom:1px solid rgba(76,143,83,.30);margin-bottom:14px}
  .brandlogo{width:42px;height:42px;object-fit:contain;background:#fff;border-radius:10px;padding:3px;flex:none;border:2px solid var(--club)}
  header .name{font-size:15px;font-weight:800;letter-spacing:.02em}
  header .name b{color:var(--club-2)}
  header .season{font-size:12px;color:var(--muted)}

  /* Tabs */
  nav{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:linear-gradient(180deg,rgba(11,18,32,.6),var(--bg) 40%);
    border-top:1px solid var(--line); padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    display:flex;gap:3px
  }
  nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0;border-radius:11px;color:var(--muted)}
  nav button .ic{font-size:18px;line-height:1}
  nav button .lb{font-size:10px;font-weight:600}

  /* Banquillo */
  .home-hero{padding:2px 2px 14px}
  .home-hero .hi{font-size:22px;font-weight:800;letter-spacing:-.01em}
  .home-hero .hi b{color:var(--club-2)}
  .home-hero .sub{color:var(--muted);font-size:13px;text-transform:capitalize}
  .nextcard{background:linear-gradient(135deg,var(--club-deep),var(--surface));border:1px solid var(--club);border-radius:16px;padding:16px;margin-bottom:12px}
  .nextcard .lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--club-2);font-weight:700}
  .nextcard .big{font-size:20px;font-weight:800;margin:4px 0 2px;text-transform:capitalize}
  .nextcard .hrs{color:var(--muted);font-size:14px}
  .shortcuts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .shortcuts button{min-height:58px;border-radius:13px;border:1px solid var(--line);background:var(--surface);font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--text)}
  .shortcuts button .ic{font-size:20px}
  .hl-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .hl-row:last-child{border-bottom:0}
  .hl-row .pl-dot{width:10px;height:10px;border-radius:50%;flex:none}
  .miniform{display:flex;gap:5px}
  .miniform span{display:inline-flex;width:24px;height:24px;border-radius:6px;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#04140a}

  /* Convocatoria */
  .callrow{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--line)}
  .callrow:last-child{border-bottom:0}
  .callrow.out{opacity:.5}
  .callrow .ck{width:24px;height:24px;border-radius:7px;border:1px solid var(--line);background:var(--surface-2);flex:none;display:flex;align-items:center;justify-content:center;font-size:13px;color:#04140a}
  .callrow.on .ck{background:var(--club);border-color:transparent}
  .callrow .cmeta{flex:1;min-width:0}
  .callrow .cmeta b{font-size:14px}
  .callrow .cdata{font-size:11px;color:var(--muted);margin-top:1px}
  .callrow .star{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:transparent;flex:none;font-size:15px;color:var(--muted-2)}
  .callrow .star.on{background:var(--foul);color:#1a1205;border-color:transparent}
  .callrow .star:disabled{opacity:.3}
  .fxrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .fxrow:last-child{border-bottom:0}
  .fxrow .fxdate{width:64px;flex:none;text-align:center;line-height:1.25}
  .fxrow .fxdate b{display:block;font-size:13px;text-transform:capitalize}
  nav button[aria-current="true"]{color:var(--text);background:var(--surface);box-shadow:inset 0 2px 0 var(--club)}
  nav button[aria-current="true"] .ic{color:var(--club-2)}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px}
  .card h2{font-size:13px;color:var(--club-2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:var(--tap);
    padding:0 16px;border-radius:12px;background:var(--surface-2);border:1px solid var(--line);font-weight:600}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--brand);color:#001520;border-color:transparent}
  .btn.ghost{background:transparent}
  .btn.block{display:flex;width:100%}
  .btn.sm{min-height:40px;padding:0 12px;font-size:14px}
  .btn.danger{color:var(--red);border-color:#3a2530}

  input,select{font-family:inherit;font-size:16px;color:var(--text);background:var(--surface-2);
    border:1px solid var(--line);border-radius:10px;padding:11px 12px;width:100%}
  label.fld{display:block;margin-bottom:10px}
  label.fld span{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}

  /* ===== Scoreboard / clock (signature) ===== */
  .board{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px;text-align:center}
  .scoreline{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:6px}
  .scoreline .team{flex:1;min-width:0}
  .scoreline .team .t{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .scoreline .num{font-size:40px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .scoreline .sep{color:var(--muted-2);font-size:24px;font-weight:700}
  .clock{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:58px;font-weight:700;line-height:1;letter-spacing:.02em}
  .clock.run{color:var(--brand)}
  .half{font-size:12px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
  .clock-ctrls{display:flex;gap:8px;margin-top:12px}
  .clock-ctrls .btn{flex:1}
  .bigplay{min-height:60px;font-size:18px}

  /* Fouls semaphore */
  .fouls{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:var(--surface-2)}
  .fouls .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .pips{display:flex;gap:5px}
  .pip{width:16px;height:16px;border-radius:50%;background:#23304a;border:1px solid var(--line)}
  .pip.on{background:var(--foul);border-color:var(--foul)}
  .fouls.warn{border-color:var(--foul)}
  .fouls.dbl{border-color:var(--red);background:#241620}
  .fouls.dbl .lbl{color:var(--red)}
  .dpen{font-size:11px;font-weight:800;color:var(--red);letter-spacing:.04em;text-transform:uppercase}

  /* Player chips */
  .court-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
  .chip{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    min-height:62px;padding:8px 6px;border-radius:12px;background:var(--surface-2);border:1px solid var(--line);text-align:center}
  .chip .dorsal{font-family:var(--mono);font-size:13px;color:var(--muted);font-weight:700}
  .chip .nm{font-size:13px;font-weight:700;line-height:1.1}
  .chip.oncourt{border-color:var(--brand);box-shadow:inset 0 0 0 1px var(--brand)}
  .chip.gk{background:#2a210f}
  .chip.sel-in{border-color:var(--goal);box-shadow:inset 0 0 0 2px var(--goal)}
  .chip .mini{position:absolute;top:4px;right:6px;font-size:10px;color:var(--muted-2);font-family:var(--mono)}
  .chip.dim{opacity:.45}

  .sub-list{margin-top:8px}
  .legend{font-size:12px;color:var(--muted);margin:4px 0 8px}

  .action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
  .act{display:flex;flex-direction:column;align-items:center;gap:4px;min-height:var(--tap);justify-content:center;border-radius:12px;border:1px solid var(--line);background:var(--surface-2);font-weight:700}
  .act small{font-size:11px;font-weight:600;color:var(--muted)}
  .act.goal{border-color:#1f4a31;color:var(--goal)}
  .act.foul{border-color:#4a3a18;color:var(--foul)}
  .act.card{border-color:#4a3030;color:#fbbf24}
  .act.rival{border-color:var(--line);color:var(--rival)}

  /* Feed */
  .feed{list-style:none;margin:0;padding:0}
  .feed li{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .feed li:last-child{border-bottom:0}
  .feed .ts{font-family:var(--mono);font-size:12px;color:var(--muted);min-width:46px}
  .feed .tag{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:6px;background:var(--surface-2)}
  .tag.goal{color:var(--goal)} .tag.foul{color:var(--foul)} .tag.card{color:#fbbf24} .tag.rival{color:var(--rival)}
  .feed .x{margin-left:auto;color:var(--muted-2);font-size:18px;padding:2px 8px}

  /* Tables */
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700;cursor:pointer;white-space:nowrap}
  td.n,th.n{text-align:right;font-variant-numeric:tabular-nums;font-family:var(--mono)}
  tr td:first-child{font-weight:600}
  .warnrow{color:var(--foul);font-size:13px;margin:-4px 0 10px}

  /* Modal */
  .scrim{position:fixed;inset:0;background:rgba(4,9,18,.72);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0}
  .sheet{width:100%;max-width:560px;background:var(--surface);border:1px solid var(--line);border-bottom:0;
    border-radius:18px 18px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom));max-height:84vh;overflow:auto}
  .sheet h3{font-size:16px;margin-bottom:12px}
  .pick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px}
  .pick{min-height:58px;border-radius:12px;border:1px solid var(--line);background:var(--surface-2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
  .pick .dorsal{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .pick .nm{font-size:13px;font-weight:700}
  .sheet .foot{display:flex;gap:8px;margin-top:14px}

  .empty{color:var(--muted);font-size:14px;text-align:center;padding:24px 8px}
  .toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:var(--text);color:#04141f;
    font-weight:700;padding:10px 16px;border-radius:999px;z-index:80;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.4);opacity:0;transition:opacity .2s, transform .2s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .hr{height:1px;background:var(--line);margin:12px 0;border:0}
  .muted{color:var(--muted)} .small{font-size:13px}
  .pillrow{display:flex;flex-wrap:wrap;gap:6px}
  .pill{font-size:12px;padding:5px 9px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line)}

  /* Entrenamientos */
  .seg{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:14px}
  .seg button{flex:1;min-height:42px;border-radius:9px;font-weight:700;color:var(--muted)}
  .seg button[aria-current="true"]{background:var(--brand);color:#001520}
  .search{display:flex;gap:8px;margin-bottom:10px}
  .chips-cat{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px;-webkit-overflow-scrolling:touch}
  .chips-cat button{white-space:nowrap;font-size:13px;padding:7px 12px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line);color:var(--muted)}
  .chips-cat button[aria-current="true"]{background:var(--brand);color:#001520;border-color:transparent;font-weight:700}
  .ex{display:flex;gap:10px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line)}
  .ex:last-child{border-bottom:0}
  .ex .meta{flex:1;min-width:0}
  .ex .tline{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .ex .nm{font-weight:700}
  .ex .cat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--brand);background:var(--brand-ink);padding:2px 7px;border-radius:6px}
  .ex .sub{font-size:13px;color:var(--muted);margin-top:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .ex .dur{font-family:var(--mono);font-size:12px;color:var(--muted-2);white-space:nowrap}
  .block{border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:10px;background:var(--surface-2)}
  .block .bh{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .block .bh input{flex:1;background:transparent;border:0;font-weight:700;padding:4px 0}
  .item{display:flex;gap:8px;align-items:center;padding:8px 0;border-top:1px solid var(--line)}
  .item .inm{flex:1;min-width:0}
  .item .min{width:64px}
  .item .min input{text-align:center;padding:8px}
  .totbar{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);margin:6px 2px 12px}
  .sess{display:flex;gap:10px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
  .sess:last-child{border-bottom:0}
  .sess .d{font-family:var(--mono);font-size:12px;color:var(--muted-2);min-width:70px}
  textarea{font-family:inherit;font-size:16px;color:var(--text);background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:11px 12px;width:100%;min-height:84px;resize:vertical}

  .todaybar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:8px 12px;margin-bottom:12px}
  .todaybar input{width:62px;text-align:center;padding:8px}
  .fit{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
  .fit.ok{color:var(--goal);background:#10241a}
  .fit.low{color:var(--red);background:#241620}
  .fit.high{color:var(--foul);background:#241f10}
  .inote{margin-top:5px;font-size:13px;padding:7px 9px;background:transparent}
  .balrow{display:flex;align-items:center;gap:8px;margin:6px 0}
  .balrow .bl-lbl{width:92px;flex:none;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .balrow .bl-bar{flex:1;height:10px;background:var(--surface-2);border-radius:999px;overflow:hidden}
  .balrow .bl-bar i{display:block;height:100%;background:var(--brand);border-radius:999px}
  .balrow .bl-min{font-family:var(--mono);font-size:12px;color:var(--muted);width:42px;text-align:right}

  /* Calendario */
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
  .calhead .mlabel{font-weight:700;font-size:15px;text-transform:capitalize}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal .dow{font-size:10px;color:var(--muted);text-align:center;padding:2px 0;font-weight:700;text-transform:uppercase}
  .cal .cell{aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;background:transparent;border:1px solid transparent;color:var(--muted-2);position:relative}
  .cal .cell.in{color:var(--text)}
  .cal .cell.train{background:var(--surface-2);border-color:var(--line);color:var(--text);font-weight:700}
  .cal .cell.train.has{border-color:var(--club);box-shadow:inset 0 0 0 1px var(--club)}
  .cal .cell.today{outline:2px solid var(--brand);outline-offset:-2px}
  .cal .cell.off{opacity:.5;text-decoration:line-through}
  .cal .cell .dot{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--club)}
  .callegend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:10px}
  .callegend i{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px}
  .att{display:flex;flex-wrap:wrap;gap:6px}
  .att button{font-size:13px;padding:7px 11px;border-radius:999px;border:1px solid var(--line);background:var(--surface-2);color:var(--text);font-weight:600}
  .att button.out{opacity:.4;text-decoration:line-through}
  .att button.out::before{content:"";}
  .dowpick{display:flex;gap:5px;flex-wrap:wrap}
  .dowpick button{flex:1;min-width:40px;min-height:42px;border-radius:9px;border:1px solid var(--line);background:var(--surface-2);color:var(--muted);font-weight:700}
  .dowpick button[aria-current="true"]{background:var(--club);color:#04140a;border-color:transparent}

  /* Ficha de jugadora */
  .pl-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
  .pl-row:last-child{border-bottom:0}
  .pl-dot{width:11px;height:11px;border-radius:50%;flex:none}
  .st-ok{background:var(--goal)} .st-tocada{background:var(--foul)} .st-lesionada{background:var(--red)} .st-baja{background:var(--muted-2)}
  .pl-av{width:38px;height:38px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:13px;color:var(--muted);flex:none}
  .pl-row .pl-meta{flex:1;min-width:0}
  .pl-row .pl-meta .nm{font-weight:700}
  .statbox{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}
  .statbox .s .v{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums}
  .statbox .s .l{font-size:11px;color:var(--muted)}
  .stsel{display:flex;gap:6px;flex-wrap:wrap}
  .stsel button{flex:1;min-width:74px;min-height:40px;border-radius:10px;border:1px solid var(--line);background:var(--surface-2);color:var(--muted);font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px}
  .stsel button[aria-current="true"]{color:var(--text);border-color:transparent}
  .stsel button[data-st="ok"][aria-current="true"]{background:#10241a;color:var(--goal)}
  .stsel button[data-st="tocada"][aria-current="true"]{background:#241f10;color:var(--foul)}
  .stsel button[data-st="lesionada"][aria-current="true"]{background:#241620;color:var(--red)}
  .stsel button[data-st="baja"][aria-current="true"]{background:var(--surface-2);color:var(--text)}
  .objr{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line)}
  .objr:last-child{border-bottom:0}
  .objr .ck{width:22px;height:22px;border-radius:6px;border:1px solid var(--line);background:var(--surface-2);flex:none;display:flex;align-items:center;justify-content:center;font-size:13px}
  .objr.done .ck{background:var(--goal);border-color:transparent;color:#04140a}
  .objr.done .tx{text-decoration:line-through;color:var(--muted)}
  .objr .tx{flex:1}
  .noter{padding:9px 0;border-bottom:1px solid var(--line)}
  .noter:last-child{border-bottom:0}
  .noter .nd{font-family:var(--mono);font-size:11px;color:var(--muted-2)}
  .injr{padding:9px 0;border-bottom:1px solid var(--line)}
  .injr:last-child{border-bottom:0}
  .injr.active{border-left:3px solid var(--red);padding-left:9px}
  .rpegrid{display:flex;flex-direction:column;gap:8px}
  .rpegrid .rpe-row{display:flex;align-items:center;gap:10px}
  .rpegrid .rpe-row .nm{flex:1;min-width:0;font-size:14px}
  .rpegrid .rpe-row input{width:64px;text-align:center}
  .loadchart{display:flex;gap:4px;align-items:flex-end;height:78px;margin-top:4px}
  .loadchart .lc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
  .loadchart .lc-bar{width:100%;max-width:26px;background:var(--brand);border-radius:4px 4px 0 0;min-height:2px}
  .loadchart .lc-bar.hot{background:var(--foul)}
  .loadchart .lc-bar.now{outline:1px solid rgba(255,255,255,.4)}
  .loadchart .lc-lbl{font-size:9px;color:var(--muted-2);font-family:var(--mono)}
  .loadflag{display:flex;gap:8px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line)}
  .loadflag:last-child{border-bottom:0}
  .loadflag .lf-dot{width:10px;height:10px;border-radius:50%;background:var(--foul);margin-top:5px;flex:none}

  /* Pizarra */
  .pbwrap{position:relative;width:100%;background:#b9824a;border:1px solid var(--line);border-radius:12px;overflow:hidden;touch-action:none}
  .pbwrap canvas{display:block;width:100%;height:auto}
  .pb-tools{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
  .pb-tools .btn{flex:1;min-width:84px}
  .pb-steps{display:flex;align-items:center;gap:8px;justify-content:center;margin:10px 0}
  .pb-steps .sn{font-family:var(--mono);font-size:14px;min-width:70px;text-align:center;color:var(--muted)}
  .pb-dots{display:flex;gap:5px;justify-content:center;margin:6px 0 2px;flex-wrap:wrap}
  .pb-dots button{width:26px;height:26px;border-radius:50%;border:1px solid var(--line);background:var(--surface-2);font-size:12px;color:var(--muted);font-weight:700}
  .pb-dots button[aria-current="true"]{background:var(--brand);color:#001520;border-color:transparent}
  .pb-play{display:flex;gap:8px;align-items:center;margin:8px 0}
  .pb-hint{font-size:12px;color:var(--muted);text-align:center;margin:4px 0 10px}
  .seg.spd{margin:0}
  .seg.spd button{min-height:36px;font-size:13px}

  /* Vista de impresión / PDF (oculta en pantalla, visible al imprimir) */
  #printArea{display:none}
  @media print{
    nav,header,.toast{display:none!important}
    body{background:#fff;color:#000;padding:0}
    .wrap{display:none!important}
    #printArea{display:block;padding:24px;max-width:none}
    #printArea h1{font-size:22px;margin:0 0 2px}
    #printArea .pmeta{color:#444;font-size:13px;margin-bottom:16px}
    #printArea .pblock{margin-bottom:14px;break-inside:avoid}
    #printArea .pblock h2{font-size:15px;border-bottom:2px solid #000;padding-bottom:3px;margin:0 0 6px;text-transform:uppercase;letter-spacing:.04em}
    #printArea .pitem{margin:0 0 8px;break-inside:avoid}
    #printArea .pitem .pt{font-weight:700;font-size:14px}
    #printArea .pitem .pt .pmin{font-weight:400;color:#555;font-size:12px}
    #printArea .pitem .pd{font-size:13px;color:#222;margin-top:2px;white-space:pre-wrap}
    #printArea .pitem .pextra{font-size:12px;color:#555;margin-top:2px}
  }
</style>
</head>

/* ---------- Persistencia ---------- */
function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }catch(e){} }
function load(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)); }catch(e){ return null; } }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ---------- Utilidades de tiempo ----------
   El reloj cuenta hacia atrás: 20:00 -> 0:00. Guardamos "segundos restantes".
   Minutos jugados en un intervalo = entradaRestante - salidaRestante.        */
function fmt(sec){
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec/60), s = sec%60;
  return m+":"+String(s).padStart(2,"0");
}
function playerById(id){ return S.roster.find(p=>p.id===id); }
function isGK(p){ return /portera/i.test(p.pos||""); }

/* =========================================================
   LÓGICA DEL PARTIDO
   ========================================================= */
function newMatch(opponent, homeAway, opts){
  opts = opts || {};
  return {
    id: uid(),
    date: opts.date || ymd(new Date()),  // "YYYY-MM-DD" (día del partido)
    time: opts.time || "",               // "HH:MM" (cada jornada la suya)
    comp: opts.comp || "liga",           // "liga" | "copa" | "amistoso"
    opponent: opponent||"Rival",
    homeAway: homeAway||"local",         // "local" | "visitante"
    half: 1,
    elapsed: 0,          // tiempo corrido transcurrido (no se para en cada saque)
    running: false,
    onCourt: [],            // ids (máx 5)
    stints: [],             // {pid, half, inSec, outSec}
    events: [],             // {id, type, half, sec, pid, assist}
    fouls: {1:0, 2:0},
    score: {us:0, them:0},
    squad: opts.squad||null,
    started: false,
    finished: false
  };
}
function matchStatus(m){ return m.finished ? "jugado" : (m.started ? "jugando" : "pendiente"); }
function compLabel(c){ return {liga:"Liga", copa:"Copa", amistoso:"Amistoso"}[c]||"Liga"; }
function playedMatches(){ return S.matches.filter(m=>m.finished); }
function pendingMatches(){ return S.matches.filter(m=>!m.finished); }
function matchWhen(m){ return (m.date||"") + (m.time?("T"+m.time):"T00:00"); }
function nextMatch(){
  const today=ymd(new Date());
  const up=S.matches.filter(m=>!m.finished && m.date && m.date>=today).sort((a,b)=>matchWhen(a).localeCompare(matchWhen(b)));
  return up.length? up[0] : null;
}

function startMatch(opponent, homeAway, fiveIds, squad){
  const m = newMatch(opponent, homeAway);
  m.onCourt = fiveIds.slice(0,5);
  if(squad && squad.length) m.squad = squad.slice();
  m.started = true;
  // abrir stints a 20:00 de la 1ª parte
  m.onCourt.forEach(pid=>m.stints.push({pid, half:1, inSec:0, outSec:null}));
  S.live = m; save();
}

function toggleClock(){
  const m = S.live; if(!m || m.finished) return;
  m.running = !m.running;
  if(m.running){
    clockTimer = setInterval(()=>{
      m.elapsed += 0.25;
      paintClock();
    },250);
  } else pauseClock();
  save(); renderMatch();
}
function pauseClock(){ const m=S.live; if(m) m.running=false; if(clockTimer){clearInterval(clockTimer);clockTimer=null;} }

function endHalf(){
  const m=S.live; if(!m) return;
  pauseClock();
  // cerrar stints abiertos de esta parte al tiempo actual
  m.stints.forEach(st=>{ if(st.half===m.half && st.outSec===null) st.outSec=m.elapsed; });
  if(m.half===1){
    m.half=2; m.elapsed=0; m.running=false;
    // las que están en pista continúan: abrir stints a 0 de la 2ª
    m.onCourt.forEach(pid=>m.stints.push({pid, half:2, inSec:0, outSec:null}));
    toast("Inicio 2ª parte");
  }
  save(); renderMatch();
}

function doSub(outId, inId){
  const m=S.live; if(!m) return;
  const t = m.elapsed;
  const st = m.stints.find(s=>s.pid===outId && s.half===m.half && s.outSec===null);
  if(st) st.outSec = t;
  m.stints.push({pid:inId, half:m.half, inSec:t, outSec:null});
  m.onCourt = m.onCourt.map(id=>id===outId?inId:id);
  selectedIn=null; save(); renderMatch();
  toast(playerById(inId).name+" entra · "+fmt(t));
}

function addEvent(type, pid, assist){
  const m=S.live; if(!m) return;
  m.events.unshift({id:uid(), type, half:m.half, sec:m.elapsed, pid:pid||null, assist:assist||null});
  if(type==="goal"){ m.score.us++; }
  if(type==="goal_rival"){ m.score.them++; }
  if(type==="foul"){ m.fouls[m.half]++; }
  save(); renderMatch();
}
function removeEvent(eid){
  const m=S.live; if(!m) return;
  const idx=m.events.findIndex(e=>e.id===eid); if(idx<0) return;
  const e=m.events[idx];
  if(e.type==="goal") m.score.us=Math.max(0,m.score.us-1);
  if(e.type==="goal_rival") m.score.them=Math.max(0,m.score.them-1);
  if(e.type==="foul") m.fouls[e.half]=Math.max(0,m.fouls[e.half]-1);
  m.events.splice(idx,1); save(); renderMatch();
}

function finishMatch(){
  const m=S.live; if(!m) return;
  pauseClock();
  m.stints.forEach(st=>{ if(st.outSec===null) st.outSec=m.elapsed; });
  m.finished=true; m.running=false;
  S.matches.unshift(m); S.live=null; matchView="home";
  save(); tab="season"; renderTabs(); render();
  toast("Partido guardado en la temporada");
}

/* minutos jugados (segundos) por jugadora en un partido */
function minutesFor(m, pid){
  let s=0;
  m.stints.forEach(st=>{
    if(st.pid!==pid) return;
    let out;
    if(st.outSec===null) out = (st.half===m.half) ? m.elapsed : st.inSec; // en pista ahora -> reloj actual
    else out = st.outSec;
    s += (out - st.inSec);
  });
  return s;
}

function nextTrainingDate(){
  if(!S.trainSchedule) return null;
  const today=ymd(new Date());
  let startStr = today<S.trainSchedule.start? S.trainSchedule.start : today;
  if(startStr>S.trainSchedule.end) return null;
  let d=parseYmd(startStr);
  for(let i=0;i<420;i++){ const ds=ymd(d); if(ds>S.trainSchedule.end) return null; if(isTrainingDay(ds)) return ds; d.setDate(d.getDate()+1); }
  return null;
}
function homeOpenSession(ds){ openPlayerId=null; openSessionId=ensureSession(ds).id; trainTab="sessions"; tab="train"; renderTabs(); renderTrain(); }
function homePending(){
  const list=[]; const today=ymd(new Date());
  if(S.trainSchedule && isTrainingDay(today)){
    const s=sessionForDate(today);
    if(!s || sessionCount(s)===0) list.push({text:"Preparar el entreno de hoy", action:()=>homeOpenSession(today)});
  }
  const past=S.sessions.filter(s=>s.date && s.date<=today && sessionCount(s)>0).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const noRpe=past.find(s=>{ const present=S.roster.filter(r=>(s.absent||[]).indexOf(r.id)<0); return present.length>0 && (!s.rpe || Object.keys(s.rpe).length===0); });
  if(noRpe) list.push({text:`Registrar el RPE del entreno del ${new Date(noRpe.date+'T00:00').toLocaleDateString('es-ES',{day:'numeric',month:'short'})}`, action:()=>homeOpenSession(noRpe.date)});
  return list;
}

function chip(p, m, where){
  const d=document.createElement("button");
  const onc = where==="court";
  d.className="chip"+(onc?" oncourt":"")+(isGK(p)?" gk":"")+(selectedIn===p.id?" sel-in":"");
  if(selectedIn && where==="bench" && selectedIn!==p.id) d.classList.add("dim");
  const mins=minutesFor(m,p.id);
  d.innerHTML=`<span class="mini">${fmt(mins)}</span><span class="dorsal">#${esc(p.number)}</span><span class="nm">${esc(p.name)}</span>`;
  d.onclick=()=>{
    if(where==="bench"){ selectedIn = (selectedIn===p.id?null:p.id); renderMatch(); }
    else { // court
      if(selectedIn){ doSub(p.id, selectedIn); }
      else { /* tocar en pista sin selección: nada / futuro: marcar saliente */ }
    }
  };
  return d;
}

function ensureDraft(fixture){
  if(fixture){
    const called=S.roster.filter(p=>p.status==="ok"||p.status==="tocada").map(p=>p.id);
    S.draftCall={opponent:fixture.opponent||"", homeAway:fixture.homeAway||"local", comp:fixture.comp||"liga", date:fixture.date||"", time:fixture.time||"", fixtureId:fixture.id, called:called, five:[]};
  } else if(!S.draftCall){
    const called=S.roster.filter(p=>p.status==="ok"||p.status==="tocada").map(p=>p.id);
    S.draftCall={opponent:"", homeAway:"local", comp:"liga", called:called, five:[]};
  }
  if(!S.draftCall.comp) S.draftCall.comp="liga";
  S.draftCall.five=S.draftCall.five.filter(id=>S.draftCall.called.includes(id));
  return S.draftCall;
}

function startFromCall(){
  const d=S.draftCall;
  if(!d || d.five.length!==5){ toast("Marca el cinco inicial (5 jugadoras)"); return; }
  let m=null;
  if(d.fixtureId){
    m=S.matches.find(x=>x.id===d.fixtureId);
    if(m){
      S.matches=S.matches.filter(x=>x.id!==d.fixtureId);   // sale de pendientes; vuelve al finalizar
      m.opponent=d.opponent||m.opponent; m.homeAway=d.homeAway||m.homeAway; m.comp=d.comp||m.comp;
      m.half=1; m.elapsed=0; m.running=false; m.stints=[]; m.events=[]; m.fouls={1:0,2:0}; m.score={us:0,them:0};
      m.onCourt=d.five.slice(); m.squad=d.called.slice();
      m.started=true; m.finished=false;
      m.onCourt.forEach(pid=>m.stints.push({pid,half:1,inSec:0,outSec:null}));
      S.live=m;
    }
  }
  if(!m){
    startMatch(d.opponent||"Rival", d.homeAway||"local", d.five.slice(), d.called.slice());
    if(S.live && d.comp) S.live.comp=d.comp;
  }
  S.draftCall=null; matchView="home"; save(); renderMatch();
}

/* ---------- TEMPORADA ---------- */
let seasonSort={key:"min",dir:-1};
let seasonComp="liga";   // 'liga' | 'copa' | 'todo'
function teamRecord(comp){
  comp = comp || "liga";
  let pj=0,v=0,e=0,d=0,gf=0,gc=0; const form=[];
  playedMatches().filter(m=> comp==="todo" || m.comp===comp).slice().sort((a,b)=>matchWhen(a).localeCompare(matchWhen(b))).forEach(m=>{
    pj++; gf+=m.score.us; gc+=m.score.them;
    if(m.score.us>m.score.them){v++;form.push("V");}
    else if(m.score.us<m.score.them){d++;form.push("D");}
    else {e++;form.push("E");}
  });
  return {pj,v,e,d,gf,gc,dif:gf-gc,form};
}
function recalcScore(m){
  m.score.us=m.events.filter(e=>e.type==="goal").length;
  m.score.them=m.events.filter(e=>e.type==="goal_rival").length;
}

function renderSeason(){
  const el=document.getElementById("view-season");
  const played=playedMatches();
  const comps=["liga","copa","amistoso"].filter(c=>played.some(m=>m.comp===c));
  // si la comp seleccionada no tiene partidos, cae a la primera disponible
  if(seasonComp!=="todo" && !played.some(m=>m.comp===seasonComp)) seasonComp = comps[0]||"liga";
  const ms = played.filter(m=> seasonComp==="todo" || m.comp===seasonComp).slice().sort((a,b)=>matchWhen(a).localeCompare(matchWhen(b)));

  const filterBar = (comps.length>1) ? `<div class="seg" id="compFilter">
    ${comps.map(c=>`<button data-c="${c}" aria-current="${seasonComp===c}">${compLabel(c)}</button>`).join("")}

  const minutesCard=`<div class="card"><h2>Reparto de minutos</h2>

  </div>`;

  // ---- tabla acumulado ----
  const head=[["name","Jugadora"],["pj","PJ"],["min","Min"],["g","G"],["a","A"],["y","🟨"],["r","🟥"]];

  </div>`;

  // ---- partidos ----
  const matchesCard=`<div class="card"><h2>Partidos</h2>

/* ---- helpers de jugadora ---- */
function ensurePlayer(p){ if(!p.status)p.status="ok"; if(!p.goals)p.goals=[]; if(!p.notes)p.notes=[]; if(!p.injuries)p.injuries=[]; }
function statusLabel(s){ return {ok:"Disponible",tocada:"Tocada",lesionada:"Lesionada",baja:"Baja"}[s]||"Disponible"; }
function injuryActive(p){ return (p.injuries||[]).some(i=>i.active); }
function playerSeasonStats(pid){
  let pj=0,min=0,g=0,a=0,y=0,r=0;
  S.matches.forEach(m=>{
    if(m.stints.some(s=>s.pid===pid)){ pj++; min+=minutesFor(m,pid); }
    m.events.forEach(e=>{
      if(e.type==="goal"&&e.pid===pid)g++;
      if(e.type==="goal"&&e.assist===pid)a++;
      if(e.type==="yellow"&&e.pid===pid)y++;
      if(e.type==="red"&&e.pid===pid)r++;
    });
  });
  return {pj,min,g,a,y,r};
}
function playerAttendance(pid){
  const today=ymd(new Date());
  const past=S.sessions.filter(s=>s.date && s.date<=today);
  const total=past.length;
  const att=past.filter(s=>(s.absent||[]).indexOf(pid)<0).length;
  return {att,total,pct: total? Math.round(att/total*100):null};
}
function sessionDuration(s){ return parseInt(s.targetMin)||sessionMinutes(s)||scheduleMinutes()||0; }
function playerLoad(pid){
  const cut=ymd(new Date(Date.now()-28*864e5));
  let load=0; const recent=[];
  S.sessions.filter(s=>s.date && s.rpe && s.rpe[pid]).sort((a,b)=>(a.date||"").localeCompare(b.date||"")).forEach(s=>{
    const c=(parseInt(s.rpe[pid])||0)*sessionDuration(s);
    if(s.date>=cut) load+=c;
    recent.push({date:s.date, rpe:s.rpe[pid]});
  });
  return {load, recent:recent.slice(-8)};
}
const MATCH_RPE=8; // intensidad estimada de un partido (no se pide RPE en partido)
function weekStart(dateStr){ const d=parseYmd(dateStr); const dow=(d.getDay()+6)%7; d.setDate(d.getDate()-dow); return ymd(d); }
function loadByWeek(pid){
  const map={};
  S.sessions.forEach(s=>{ if(s.date && s.rpe && s.rpe[pid]){ const w=weekStart(s.date); map[w]=(map[w]||0)+(parseInt(s.rpe[pid])||0)*sessionDuration(s); } });
  S.matches.forEach(m=>{ if(m.date && m.finished){ const mins=minutesFor(m,pid); if(mins>0){ const w=weekStart(m.date); map[w]=(map[w]||0)+Math.round(mins/60*MATCH_RPE); } } });
  return map;
}
function loadWeeks(pid,n){
  const map=loadByWeek(pid);
  const keys=Object.keys(map).filter(k=>map[k]>0).sort();
  const endW = keys.length? keys[keys.length-1] : weekStart(ymd(new Date()));
  const base=parseYmd(endW); const out=[];
  for(let i=n-1;i>=0;i--){ const wd=new Date(base); wd.setDate(base.getDate()-i*7); const k=ymd(wd); out.push({week:k, load:Math.round(map[k]||0)}); }
  return out;
}
function loadSignal(pid){
  const weeks=loadWeeks(pid,8);
  const last=weeks[weeks.length-1].load;
  const prev=weeks.slice(-4,-1).map(w=>w.load).filter(x=>x>0);
  const chronic=prev.length? prev.reduce((a,b)=>a+b,0)/prev.length : 0;
  const ratio= chronic>0? last/chronic : null;
  const reasons=[];
  if(ratio!=null && ratio>=1.5 && last>0) reasons.push(`carga +${Math.round((ratio-1)*100)}% sobre su media`);
  const p=playerById(pid);
  if(p){
    if(injuryActive(p)) reasons.push("lesión activa");
    else if((p.injuries||[]).some(j=>j.altaDate && j.altaDate>=ymd(new Date(Date.now()-21*864e5)))) reasons.push("vuelve de lesión");
    if(p.status==="tocada") reasons.push("está tocada");
  }
  return {weeks, last, chronic, ratio, reasons, hasData: weeks.some(w=>w.load>0)};
}

function renderPlayerCard(el){
  const p=S.roster.find(x=>x.id===openPlayerId);
  if(!p){ openPlayerId=null; return renderRoster(); }
  ensurePlayer(p);
  const st=playerSeasonStats(p.id), at=playerAttendance(p.id), ld=playerLoad(p.id);
  const sig=loadSignal(p.id);
  const maxL=Math.max(1,...sig.weeks.map(w=>w.load));
  const chartHTML=sig.weeks.map((w,i)=>{
    const isNow=i===sig.weeks.length-1;
    const hot=isNow && sig.ratio!=null && sig.ratio>=1.5;
    const h=Math.round(w.load/maxL*100);
    const d=parseYmd(w.week);
    return `<div class="lc-col"><div class="lc-bar ${hot?'hot':''} ${isNow?'now':''}" style="height:${h}%" title="${w.load}"></div><div class="lc-lbl">${d.getDate()}/${d.getMonth()+1}</div></div>`;
  }).join("");
  const states=[["ok","Disponible"],["tocada","Tocada"],["lesionada","Lesionada"],["baja","Baja"]];

  el.innerHTML=`
    <div class="row" style="margin-bottom:10px">
      <button class="btn sm ghost" id="pcBack">← Plantilla</button>
    </div>
    <div class="card">
      <div class="row" style="gap:12px">

        <div class="grow"><div style="font-size:20px;font-weight:800">${esc(p.name)}</div><div class="muted small">${esc(p.pos||"")}</div></div>

/* encaje según nº de jugadoras de hoy */
function parsePlayers(str){
  if(!str) return null;
  const nums=(String(str).match(/\d+/g)||[]).map(Number);
  if(!nums.length) return null;
  if(nums.length>=2) return {min:Math.min(...nums),max:Math.max(...nums)};
  if(/\+/.test(str)) return {min:nums[0],max:Infinity};
  return {min:nums[0],max:nums[0]};
}
function fitsCount(str,n){
  const r=parsePlayers(str); if(r==null||n==null||isNaN(n)) return null;
  if(n<r.min) return {k:'low', d:r.min-n};
  if(n>r.max) return {k:'high', d:n-r.max};
  return {k:'ok'};
}
function fitBadge(str){
  const n = (sessionCtxCount!=null)? sessionCtxCount : S.trainTodayCount;
  const f=fitsCount(str, n); if(!f) return "";
  if(f.k==='ok')  return `<span class="fit ok" title="encaja">✓</span>`;
  if(f.k==='low') return `<span class="fit low">faltan ${f.d}</span>`;
  return `<span class="fit high">+${f.d}</span>`;
}

/* ---- Sesiones ---- */
function sessionMinutes(s){ return (s.blocks||[]).reduce((t,b)=>t+b.items.reduce((u,i)=>u+(parseInt(i.minutes)||0),0),0); }
function sessionCount(s){ return (s.blocks||[]).reduce((t,b)=>t+b.items.length,0); }

function balanceCard(){
  const withItems=S.sessions.filter(s=>sessionCount(s)>0);
  if(withItems.length<2) return "";
  const cutoff=Date.now()-28*864e5;
  const recent=withItems.filter(s=>s.date && new Date(s.date+'T00:00').getTime()>=cutoff);
  const use=recent.length?recent:withItems;
  const byCat={}; let total=0;
  use.forEach(s=>s.blocks.forEach(b=>b.items.forEach(it=>{
    const ex=S.exercises.find(e=>e.id===it.exerciseId); if(!ex) return;
    const m=parseInt(it.minutes)||0; byCat[ex.category]=(byCat[ex.category]||0)+m; total+=m;
  })));
  if(!total) return "";
  const cats=EX_CATS.filter(c=>byCat[c]);
  const missing=EX_CATS.filter(c=>!byCat[c]);
  const max=Math.max(...cats.map(c=>byCat[c]));
  return `<div class="card">
    <h2>Balance de contenidos · ${recent.length?"últimas 4 semanas":"todas las sesiones"}</h2>
    ${cats.map(c=>`<div class="balrow"><span class="bl-lbl">${esc(c)}</span><div class="bl-bar"><i style="width:${Math.round(byCat[c]/max*100)}%"></i></div><span class="bl-min">${byCat[c]}′</span></div>`).join("")}
    ${missing.length?`<div class="muted small" style="margin-top:8px">Sin tocar: ${missing.map(esc).join(", ")}</div>`:""}
  </div>`;
}

/* ---- Calendario de temporada ---- */
const DOW_ES=["L","M","X","J","V","S","D"];          // lunes-first
const MONTHS_ES=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
function pad2(n){ return String(n).padStart(2,"0"); }
function ymd(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function parseYmd(s){ const a=s.split("-").map(Number); return new Date(a[0],a[1]-1,a[2]); }
function timeToMin(t){ if(!t) return 0; const a=t.split(":").map(Number); return a[0]*60+(a[1]||0); }
function scheduleMinutes(){ const s=S.trainSchedule; if(!s) return 0; return Math.max(0, timeToMin(s.endTime)-timeToMin(s.startTime)); }
function isTrainingDay(dateStr){
  const ov=S.calOverrides[dateStr];
  if(ov==="off") return false;
  if(ov==="on") return true;
  const s=S.trainSchedule; if(!s) return false;
  if(dateStr<s.start || dateStr>s.end) return false;
  return s.weekdays.indexOf(parseYmd(dateStr).getDay())>=0;
}
function sessionForDate(d){ return S.sessions.find(x=>x.date===d); }
function ensureSession(dateStr){
  let s=sessionForDate(dateStr);
  if(!s){
    const dur=scheduleMinutes();
    s={id:uid(), date:dateStr, title:"", focus:"", targetMin:dur?String(dur):"", notes:"", absent:[],
      blocks:[{id:uid(),name:"Calentamiento",items:[]},{id:uid(),name:"Parte principal",items:[]},{id:uid(),name:"Vuelta a la calma",items:[]}]};
    S.sessions.push(s); save();
  }
  if(!s.absent) s.absent=[];
  return s;
}
function presentCount(s){ return S.roster.filter(r=>(s.absent||[]).indexOf(r.id)<0).length; }

    <div class="foot"><button class="btn ghost grow" id="cfCancel">Cancelar</button><button class="btn primary grow" id="cfSave">Guardar</button></div>`);
  const sel=new Set(s.weekdays);
  document.querySelectorAll("#cfDows button").forEach(b=>b.onclick=()=>{
    const d=+b.dataset.d; if(sel.has(d))sel.delete(d); else sel.add(d);
    b.setAttribute("aria-current", sel.has(d));
  });
  document.getElementById("cfCancel").onclick=closeModal;
  document.getElementById("cfSave").onclick=()=>{
    const start=document.getElementById("cfStart").value, end=document.getElementById("cfEnd").value;
    if(!start||!end||start>end){ toast("Revisa las fechas"); return; }
    if(!sel.size){ toast("Elige al menos un día"); return; }
    S.trainSchedule={start, end, weekdays:[...sel], startTime:document.getElementById("cfT1").value||"20:00", endTime:document.getElementById("cfT2").value||"21:30"};
    if(!calCursor || calCursor<start.slice(0,7)) calCursor=start.slice(0,7);
    save(); closeModal(); renderSessions(); toast("Calendario configurado");
  };
}

function renderCalendar(body){
  const sch=S.trainSchedule;
  const todayStr=ymd(new Date());
  if(!calCursor){ calCursor = (todayStr>=sch.start && todayStr<=sch.end)? todayStr.slice(0,7) : sch.start.slice(0,7); }
  const [cy,cm]=calCursor.split("-").map(Number);
  const first=new Date(cy,cm-1,1);
  const startMonth=sch.start.slice(0,7), endMonth=sch.end.slice(0,7);
  const offset=(first.getDay()+6)%7; // lunes=0
  const daysInMonth=new Date(cy,cm,0).getDate();

  let cells="";
  for(let i=0;i<offset;i++) cells+=`<div class="cell"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const ds=cy+"-"+pad2(cm)+"-"+pad2(d);
    const train=isTrainingDay(ds);
    const inRange=(ds>=sch.start && ds<=sch.end);
    const sess=sessionForDate(ds);
    const has=sess && sessionCount(sess)>0;
    const off=(inRange && S.trainSchedule.weekdays.indexOf(parseYmd(ds).getDay())>=0 && S.calOverrides[ds]==="off");
    const cls=["cell", inRange?"in":"", train?"train":"", has?"has":"", ds===todayStr?"today":"", off?"off":""].filter(Boolean).join(" ");
    cells+=`<div class="${cls}" data-day="${ds}" data-train="${train?1:0}" data-range="${inRange?1:0}">${d}${has?'<span class="dot"></span>':""}</div>`;
  }

  const next=c4=>{ const m=cm-1+c4, y=cy+Math.floor(m/12), mm=((m%12)+12)%12; return pad2(mm+1)?`${y}-${pad2(mm+1)}`:""; };
  const prevM=next(-1), nextM=next(1);
  const canPrev=prevM>=startMonth, canNext=nextM<=endMonth;

  body.innerHTML=`
    <div class="calhead">
      <button class="btn sm ghost" id="calPrev" ${canPrev?"":"disabled"}>‹</button>
      <span class="mlabel">${MONTHS_ES[cm-1]} ${cy}</span>
      <button class="btn sm ghost" id="calNext" ${canNext?"":"disabled"}>›</button>
    </div>
    <div class="card">
      <div class="cal">${DOW_ES.map(d=>`<div class="dow">${d}</div>`).join("")}${cells}</div>
      <div class="callegend">
        <span><i style="background:var(--surface-2);border:1px solid var(--club)"></i>entreno</span>
        <span><i style="background:var(--club)"></i>preparado</span>
        <span><i style="background:transparent;outline:2px solid var(--brand)"></i>hoy</span>
      </div>
    </div>
    <div class="pb-hint">Toca un día de entreno para preparar la sesión. Toca otro día para añadir un entreno extra.</div>
    <button class="btn ghost block" id="calReconf">Reconfigurar temporada</button>
    ${balanceCard()}`;

  body.querySelector("#calPrev").onclick=()=>{ if(canPrev){ calCursor=prevM; renderCalendar(body);} };
  body.querySelector("#calNext").onclick=()=>{ if(canNext){ calCursor=nextM; renderCalendar(body);} };
  body.querySelector("#calReconf").onclick=()=>calConfig();
  body.querySelectorAll("[data-day]").forEach(c=>c.onclick=()=>{
    const ds=c.dataset.day; if(c.dataset.range!=="1") return;
    if(c.dataset.train==="1"){ openSessionId=ensureSession(ds).id; renderSessions(); }
    else {
      if(confirm("¿Añadir un entreno extra este día?")){ S.calOverrides[ds]="on"; openSessionId=ensureSession(ds).id; save(); renderSessions(); }
    }
  });
}

function duplicateSession(id){
  const s=S.sessions.find(x=>x.id===id); if(!s) return;
  const copy=JSON.parse(JSON.stringify(s));
  copy.id=uid(); copy.date=new Date().toISOString().slice(0,10);
  copy.title=(s.title||"Sesión")+" (copia)"; copy.notes=""; copy.absent=[];
  copy.blocks.forEach(b=>{ b.id=uid(); b.items.forEach(i=>i.id=uid()); });
  S.sessions.push(copy); save(); openSessionId=copy.id; renderSessions(); toast("Sesión duplicada");
}
function totbarHTML(s){
  const tot=sessionMinutes(s), tgt=parseInt(s.targetMin)||0;
  let right=`<b style="color:var(--text)">${tot}′</b>`;
  if(tgt){
    const diff=tot-tgt;
    const col= diff>0?'var(--foul)':(diff<-10?'var(--muted)':'var(--goal)');
    const msg= diff>0?`te pasas ${diff}′`:(diff<0?`quedan ${-diff}′`:'justo');
    right=`<b style="color:var(--text)">${tot}′</b> / ${tgt}′ <span style="color:${col}">· ${msg}</span>`;
  }
  return `<span>${sessionCount(s)} ejercicios</span><span>${right}</span>`;
}

function pickExercise(blockId, s, body){

  const list=S.exercises.slice().sort((a,b)=>a.name.localeCompare(b.name));
  modal(`<h3>Añadir ejercicio</h3>
    <input id="pkSearch" placeholder="Buscar…" style="margin-bottom:10px">
    <div id="pkList" class="card" style="padding:4px 14px;max-height:50vh;overflow:auto"></div>

  const draw=(q)=>{
    const f=q?list.filter(x=>(x.name+" "+(x.category||"")).toLowerCase().includes(q.toLowerCase())):list;
    const cont=document.getElementById("pkList");
    cont.innerHTML=f.length?f.map(pkRow).join(""):`<div class="empty">Nada</div>`;
    cont.querySelectorAll("[data-pick]").forEach(b=>b.onclick=()=>{
      const bl=s.blocks.find(x=>x.id===blockId); const ex=S.exercises.find(e=>e.id===b.dataset.pick);

}

  // binds cabecera
  el.querySelector("#pbBack").onclick=()=>{ pbStop(); openPlayId=null; renderBoard(); };

  el.querySelector("#pbPng").onclick=()=>pbExportPNG(p);

  // pasos
  el.querySelector("#stPrev").onclick=()=>{ if(pbStep>0){pbStep--; pbDraw(p); pbSteps(p);} };
  el.querySelector("#stNext").onclick=()=>{ if(pbStep<p.steps.length-1){pbStep++; pbDraw(p); pbSteps(p);} };
  el.querySelector("#stAdd").onclick=()=>{ p.steps.splice(pbStep+1,0,clonePos(p.steps[pbStep])); pbStep++; save(); pbDraw(p); pbSteps(p); toast("Paso añadido (copia del actual)"); };
  el.querySelector("#stDup").onclick=()=>{ p.steps.splice(pbStep+1,0,clonePos(p.steps[pbStep])); pbStep++; save(); pbDraw(p); pbSteps(p); };
  el.querySelector("#stDel").onclick=()=>{ if(p.steps.length<=1){ toast("Debe quedar al menos un paso"); return; } p.steps.splice(pbStep,1); if(pbStep>=p.steps.length)pbStep=p.steps.length-1; save(); pbDraw(p); pbSteps(p); };

  // play + velocidad
  el.querySelector("#pbPlay").onclick=()=>{ pbPlaying?pbStop():pbPlay(p); };

function clonePos(step){ return {pos: JSON.parse(JSON.stringify(step.pos))}; }
function pbSteps(p){
  const lbl=document.getElementById("stLabel"); if(lbl) lbl.textContent=`Paso ${pbStep+1} / ${p.steps.length}`;
  const dots=document.getElementById("pbDots"); if(!dots) return;
  dots.innerHTML=p.steps.map((s,i)=>`<button data-st="${i}" aria-current="${i===pbStep}">${i+1}</button>`).join("");
  dots.querySelectorAll("[data-st]").forEach(b=>b.onclick=()=>{ pbStep=+b.dataset.st; pbDraw(p); pbSteps(p); });
  const pb=document.getElementById("pbPlay"); if(pb) pb.textContent=pbPlaying?"⏹ Parar":"▶ Reproducir";
}

/* ---- tokens ---- */
function pbNextLabel(p, kind, gk){
  if(kind==="ball") return "";
  if(gk){
    if(kind==="home" && p.labelMode==="real"){
      const used=new Set(p.tokens.filter(t=>t.kind==="home").map(t=>t.label));
      const gkR=S.roster.find(r=>/portera/i.test(r.pos||"") && !used.has(r.number));
      if(gkR) return gkR.number;
    }
    return "P";
  }
  const same=p.tokens.filter(t=>t.kind===kind && !t.gk);
  if(kind==="away") return String(same.length+1);
  if(p.labelMode==="real"){
    const used=new Set(p.tokens.filter(t=>t.kind==="home").map(t=>t.label));
    const free=S.roster.find(r=>!/portera/i.test(r.pos||"") && !used.has(r.number));
    return free?free.number:String(same.length+1);
  }
  return String(same.length+1);
}
function pbAddToken(p, kind, gk){
  const t={id:uid(), kind, gk:!!gk, label:pbNextLabel(p,kind,gk)};
  p.tokens.push(t);
  const n=p.tokens.length;
  const x = kind==="ball"?0.5 : (kind==="home"?0.3:0.7);
  const y = 0.12 + (n%6)*0.13;
  p.steps.forEach(st=>{ st.pos[t.id]={x, y:Math.min(0.9,y)}; });
  save(); pbDraw(p);
}
function pbRelabel(p){
  let h=0;
  p.tokens.forEach(t=>{
    if(t.kind!=="home") return;
    h++;
    if(p.labelMode==="real"){ const r=S.roster[h-1]; t.label=r?r.number:String(h); }
    else t.label=String(h);
  });
}
function pbTokenTap(p, tokenId){
  const t=p.tokens.find(x=>x.id===tokenId); if(!t) return;
  if(t.kind==="ball"){
    modal(`<h3>Balón</h3><div class="foot"><button class="btn ghost grow" id="bc">Cerrar</button><button class="btn danger grow" id="bd">Eliminar</button></div>`);
    document.getElementById("bc").onclick=closeModal;
    document.getElementById("bd").onclick=()=>{ pbRemoveToken(p,tokenId); closeModal(); };
    return;
  }
  if(t.kind==="home" && p.labelMode==="real"){
    const opts=S.roster.map(r=>`<button class="pick" data-r="${esc(r.number)}"><span class="dorsal">#${esc(r.number)}</span><span class="nm">${esc(r.name)}</span></button>`).join("");
    modal(`<h3>Asignar jugadora</h3><div class="pick-grid">${opts}</div>
      <button class="btn block" id="tgk" style="margin-top:10px">${t.gk?"Quitar portera":"Marcar como portera"}</button>
      <div class="foot"><button class="btn ghost grow" id="tc">Cerrar</button><button class="btn danger grow" id="td">Eliminar ficha</button></div>`);
    document.querySelectorAll(".sheet .pick").forEach(b=>b.onclick=()=>{ t.label=b.dataset.r; save(); closeModal(); pbDraw(p); });
    document.getElementById("tgk").onclick=()=>{ t.gk=!t.gk; if(t.gk&&!isNaN(+t.label)){} save(); closeModal(); pbDraw(p); };
    document.getElementById("tc").onclick=closeModal;
    document.getElementById("td").onclick=()=>{ pbRemoveToken(p,tokenId); closeModal(); };
    return;
  }
  modal(`<h3>${t.kind==="home"?"Ficha propia":"Ficha rival"} ${esc(t.label)}</h3>
    <label class="fld"><span>Etiqueta</span><input id="tlab" value="${esc(t.label)}" maxlength="3"></label>
    <button class="btn block" id="tgk">${t.gk?"Quitar portera":"Marcar como portera"}</button>
    <div class="foot"><button class="btn ghost grow" id="tc">Cerrar</button><button class="btn danger grow" id="td">Eliminar</button></div>`);
  const i=document.getElementById("tlab"); i.oninput=()=>{ t.label=i.value; save(); pbDraw(p); };
  document.getElementById("tgk").onclick=()=>{ t.gk=!t.gk; if(t.gk&&(t.label===""||t.label==null)) t.label="P"; save(); closeModal(); pbDraw(p); };
  document.getElementById("tc").onclick=closeModal;
  document.getElementById("td").onclick=()=>{ pbRemoveToken(p,tokenId); closeModal(); };
}
function pbRemoveToken(p, tokenId){
  p.tokens=p.tokens.filter(t=>t.id!==tokenId);
  p.steps.forEach(st=>{ delete st.pos[tokenId]; });
  save(); pbDraw(p);
}

/* ---- canvas ---- */
function pbSetupCanvas(p){
  pbCanvas=document.getElementById("pbCanvas");
  pbCtx=pbCanvas.getContext("2d");
  pbResize(); pbDraw(p);
  window.onresize=()=>{ pbResize(); };
  // pointer
  pbCanvas.onpointerdown=(e)=>{
    if(pbPlaying) return;
    const n=pbXY(e); const id=pbHit(p,n.x,n.y);
    if(id){ pbDrag={id, sx:n.x, sy:n.y, moved:false}; pbCanvas.setPointerCapture(e.pointerId); }
  };
  pbCanvas.onpointermove=(e)=>{
    if(!pbDrag||pbPlaying) return;
    const n=pbXY(e);
    if(Math.abs(n.x-pbDrag.sx)+Math.abs(n.y-pbDrag.sy)>0.012) pbDrag.moved=true;
    p.steps[pbStep].pos[pbDrag.id]={x:clamp01(n.x), y:clamp01(n.y)};
    pbDraw(p);
  };
  pbCanvas.onpointerup=(e)=>{
    if(!pbDrag) return;
    const wasMoved=pbDrag.moved, id=pbDrag.id; pbDrag=null;
    if(wasMoved){ save(); } else { pbTokenTap(p, id); }
  };
}
function pbResize(){
  if(!pbCanvas) return;
  const wrap=document.getElementById("pbWrap"); if(!wrap) return;
  const cssW=wrap.clientWidth, cssH=cssW/2;
  const dpr=window.devicePixelRatio||1;
  pbCanvas.width=Math.round(cssW*dpr); pbCanvas.height=Math.round(cssH*dpr);
  pbCanvas.style.height=cssH+"px";
  pbCtx.setTransform(dpr,0,0,dpr,0,0);
  pbCanvas._cssW=cssW; pbCanvas._cssH=cssH;
}
function pbXY(e){
  const r=pbCanvas.getBoundingClientRect();
  return {x:(e.clientX-r.left)/r.width, y:(e.clientY-r.top)/r.height};
}
function pbHit(p, x, y){
  const W=pbCanvas._cssW, R=PB_R*W;
  for(let i=p.tokens.length-1;i>=0;i--){
    const t=p.tokens[i], pos=p.steps[pbStep].pos[t.id]; if(!pos) continue;
    const dx=(x-pos.x)*W, dy=(y-pos.y)*(W/2);
    if(dx*dx+dy*dy <= (R*1.3)*(R*1.3)) return t.id;
  }
  return null;
}
function clamp01(v){ return Math.max(0,Math.min(1,v)); }

function pbDraw(p, positions){
  if(!pbCtx||!pbCanvas) return;
  const W=pbCanvas._cssW, H=pbCanvas._cssH;
  pbCtx.clearRect(0,0,W,H);
  pbDrawPitch(W,H);
  const pos = positions || p.steps[pbStep].pos;
  // recorridos al siguiente paso (solo en edición)
  if(!positions && !pbPlaying && pbStep<p.steps.length-1){
    const nxt=p.steps[pbStep+1].pos;
    p.tokens.forEach(t=>{
      const a=pos[t.id], b=nxt[t.id]; if(!a||!b) return;
      if(a.x===b.x && a.y===b.y) return;
      pbCtx.strokeStyle = t.kind==="ball"?"rgba(255,255,255,.5)":(t.kind==="home"?"rgba(63,161,78,.7)":"rgba(248,113,113,.5)");
      pbCtx.lineWidth=2; pbCtx.setLineDash(t.kind==="ball"?[3,4]:[6,5]);
      pbCtx.beginPath(); pbCtx.moveTo(a.x*W,a.y*H); pbCtx.lineTo(b.x*W,b.y*H); pbCtx.stroke();
      pbCtx.setLineDash([]);
      // punta de flecha
      const ang=Math.atan2((b.y-a.y)*H,(b.x-a.x)*W);
      pbCtx.beginPath(); pbCtx.moveTo(b.x*W,b.y*H);
      pbCtx.lineTo(b.x*W-9*Math.cos(ang-0.4), b.y*H-9*Math.sin(ang-0.4));
      pbCtx.moveTo(b.x*W,b.y*H);
      pbCtx.lineTo(b.x*W-9*Math.cos(ang+0.4), b.y*H-9*Math.sin(ang+0.4));
      pbCtx.stroke();
    });
  }
  p.tokens.forEach(t=>{ const pp=pos[t.id]; if(pp) pbDrawToken(t,pp,W,H); });
}
function pbDrawPitch(W,H){
  const c=pbCtx, line="rgba(255,255,255,.82)";
  // ---- parquet (tablones verticales con vetas) ----
  const tones=["#b9824a","#bd8950","#b27c44","#c0905a"];
  const planks=14, pw=W/planks;
  for(let i=0;i<planks;i++){
    c.fillStyle=tones[i%tones.length];
    c.fillRect(i*pw,0,pw+1,H);
    c.strokeStyle="rgba(90,55,25,.25)"; c.lineWidth=1;
    c.beginPath(); c.moveTo(i*pw,0); c.lineTo(i*pw,H); c.stroke();
  }
  // juntas horizontales sutiles entre duelas
  c.strokeStyle="rgba(90,55,25,.16)"; c.lineWidth=1;
  for(let y=H/4;y<H;y+=H/4){ c.beginPath(); c.moveTo(0,y); c.lineTo(W,y); c.stroke(); }
  // sombreado de viñeta
  const g=c.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"rgba(0,0,0,.10)"); g.addColorStop(.5,"rgba(0,0,0,0)"); g.addColorStop(1,"rgba(0,0,0,.12)");
  c.fillStyle=g; c.fillRect(0,0,W,H);

  // ---- líneas de pista ----
  c.strokeStyle=line; c.lineWidth=2;
  const m=W*0.02;
  c.strokeRect(m,m,W-2*m,H-2*m);
  c.beginPath(); c.moveTo(W/2,m); c.lineTo(W/2,H-m); c.stroke();
  c.beginPath(); c.arc(W/2,H/2, W*0.075, 0, 7); c.stroke();

  // ---- logo del club en el círculo central ----
  if(pbLogo && pbLogo.complete && pbLogo.naturalWidth){
    const R=W*0.072, iw=pbLogo.naturalWidth, ih=pbLogo.naturalHeight;
    const sc=(R*2)/Math.max(iw,ih)*0.96, dw=iw*sc, dh=ih*sc;
    c.save(); c.beginPath(); c.arc(W/2,H/2,R,0,7); c.clip();
    c.globalAlpha=0.55; c.drawImage(pbLogo, W/2-dw/2, H/2-dh/2, dw, dh); c.globalAlpha=1; c.restore();
    c.strokeStyle=line; c.beginPath(); c.arc(W/2,H/2,W*0.075,0,7); c.stroke();
  } else {
    c.fillStyle=line; c.beginPath(); c.arc(W/2,H/2,2.5,0,7); c.fill();
  }

  // ---- áreas y porterías ----
  const drawGoalArea=(left)=>{
    const gx = left? m : W-m, dir = left? 1 : -1, r=W*0.15, gh=H*0.15;
    c.strokeStyle=line; c.lineWidth=2;
    c.beginPath(); c.arc(gx, H/2, r, left?-Math.PI/2:Math.PI/2, left?Math.PI/2:3*Math.PI/2, false); c.stroke();
    c.strokeStyle="rgba(255,255,255,.95)"; c.lineWidth=3;
    c.beginPath(); c.moveTo(gx, H/2-gh*0.5); c.lineTo(gx-dir*W*0.012, H/2-gh*0.5);
    c.lineTo(gx-dir*W*0.012, H/2+gh*0.5); c.lineTo(gx, H/2+gh*0.5); c.stroke();
    c.strokeStyle=line; c.lineWidth=2;
    c.fillStyle=line; c.beginPath(); c.arc(gx+dir*W*0.25, H/2, 2.5, 0, 7); c.fill();
    c.beginPath(); c.arc(gx+dir*W*0.15, H/2, 2, 0, 7); c.fill();
  };
  drawGoalArea(true); drawGoalArea(false);
}
function pbDrawToken(t,pos,W,H){
  const c=pbCtx, x=pos.x*W, y=pos.y*H, R=PB_R*W;
  if(t.kind==="ball"){
    c.fillStyle="#fff"; c.strokeStyle="#111"; c.lineWidth=1.5;
    c.beginPath(); c.arc(x,y,R*0.62,0,7); c.fill(); c.stroke();
    return;
  }
  const teamCol = t.kind==="home"?"#3fa14e":"#ef4444";
  if(t.gk){
    c.fillStyle="#facc15";                       // portera: amarillo
    c.strokeStyle=teamCol; c.lineWidth=3.5;       // borde del color de su equipo
  } else {
    c.fillStyle=teamCol; c.strokeStyle="rgba(255,255,255,.92)"; c.lineWidth=2.4;
  }
  c.beginPath(); c.arc(x,y,R,0,7); c.fill(); c.stroke();
  c.fillStyle = t.gk?"#1a1205":"#fff";
  c.font=`700 ${Math.round(R*1.05)}px system-ui,sans-serif`;
  c.textAlign="center"; c.textBaseline="middle";
  c.fillText(String(t.label||""), x, y+0.5);
}

/* ---- reproducción ---- */
function pbPlay(p){
  if(p.steps.length<2){ toast("Añade al menos 2 pasos para animar"); return; }
  pbPlaying=true; pbSteps(p);
  let seg=0; const dur=p.stepMs;
  const run=(t0)=>{
    const a=p.steps[seg].pos, b=p.steps[seg+1].pos;
    const start=performance.now();
    const frame=(now)=>{
      if(!pbPlaying) return;
      let k=(now-start)/dur; if(k>1) k=1;
      const e = k<0.5? 2*k*k : 1-Math.pow(-2*k+2,2)/2; // easeInOut
      const inter={};
      p.tokens.forEach(tok=>{ const pa=a[tok.id], pb=b[tok.id]; if(!pa||!pb) return;
        inter[tok.id]={x:pa.x+(pb.x-pa.x)*e, y:pa.y+(pb.y-pa.y)*e}; });
      pbDraw(p, inter);
      if(k<1){ pbRAF=requestAnimationFrame(frame); }
      else { seg++; if(seg<p.steps.length-1){ pbRAF=requestAnimationFrame(()=>run()); } else { pbStop(); pbStep=p.steps.length-1; pbDraw(p); pbSteps(p); } }
    };
    pbRAF=requestAnimationFrame(frame);
  };
  run();
}
function pbStop(){
  pbPlaying=false;
  if(pbRAF){ cancelAnimationFrame(pbRAF); pbRAF=null; }
  const pb=document.getElementById("pbPlay"); if(pb) pb.textContent="▶ Reproducir";
}

/* ---- export PNG del paso actual ---- */
function pbExportPNG(p){
  if(!pbCanvas) return;
  // fondo opaco para el PNG
  const tmp=document.createElement("canvas"); tmp.width=pbCanvas.width; tmp.height=pbCanvas.height;
  const tc=tmp.getContext("2d"); tc.fillStyle="#b9824a"; tc.fillRect(0,0,tmp.width,tmp.height);
  tc.drawImage(pbCanvas,0,0);
  const a=document.createElement("a");
  a.href=tmp.toDataURL("image/png");
  a.download=(p.name||"jugada").replace(/[^\w\-]+/g,"_")+"_paso"+(pbStep+1)+".png";
  a.click();
  toast("Imagen del paso descargada");
}

/* ---------- Export / Import (acumular) ---------- */

function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="futsala-villaverde_"+new Date().toISOString().slice(0,10)+".json";
  a.click(); URL.revokeObjectURL(a.href);
  toast("Copia descargada");
}
function importData(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".json,application/json";
  inp.onchange=()=>{
    const file=inp.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const data=JSON.parse(r.result);
        if(!data || (!data.matches && !data.exercises && !data.sessions && !data.plays)){ toast("Archivo no válido"); return; }
        let added=0;
        const haveM=new Set(S.matches.map(m=>m.id));
        (data.matches||[]).forEach(m=>{ if(!haveM.has(m.id)){ S.matches.push(m); added++; } });
        const haveE=new Set(S.exercises.map(x=>x.id));
        (data.exercises||[]).forEach(x=>{ if(!haveE.has(x.id)){ S.exercises.push(x); added++; } });
        const haveS=new Set(S.sessions.map(x=>x.id));
        (data.sessions||[]).forEach(x=>{ if(!haveS.has(x.id)){ S.sessions.push(x); added++; } });
        const haveP=new Set(S.plays.map(x=>x.id));
        (data.plays||[]).forEach(x=>{ if(!haveP.has(x.id)){ S.plays.push(x); added++; } });
        if((!S.roster||!S.roster.length) && data.roster) S.roster=data.roster;
        S.matches.sort((a,b)=>new Date(b.date)-new Date(a.date));
        save(); render(); renderTabs();
        toast(added?`+${added} elemento${added>1?"s":""} acumulado${added>1?"s":""}`:"Nada nuevo que añadir");
      }catch(e){ toast("No se pudo leer el archivo"); }
    };
    r.readAsText(file);
  };
  inp.click();
}

}
function paintClock(){

function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }
